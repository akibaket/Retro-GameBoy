<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akiba Defender - Akiba-OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 300px;
            height: 400px;
            cursor: crosshair;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            background: var(--screen-green);
            z-index: 5;
        }

        canvas { display: block; background-color: #8bab0e; }

        .energy-bar-container {
            position: absolute;
            bottom: 60px;
            left: 10px;
            width: 280px;
            height: 10px;
            border: 2px solid var(--text-dark);
            background: #306230;
            z-index: 5;
        }

        #energy-fill {
            height: 100%;
            width: 100%;
            background: var(--text-dark);
            transition: width 0.1s linear;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
        h2 { font-size: 10px; margin-bottom: 15px; line-height: 1.6; }

        .btn-overlay {
            padding: 12px; font-size: 10px; width: 180px;
            color: #eee; background: #222; border: 4px solid #444;
            border-radius: 8px; font-family: var(--font-main);
            margin-bottom: 10px;
            cursor: pointer;
        }

        .instruction {
            font-size: 7px;
            margin-top: 10px;
            line-height: 1.4;
            color: #306230;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen" id="game-screen">
            <div class="hud">
                <div>SCORE: <span id="score">000</span></div>
                <div>CPU: <span id="health">100</span>%</div>
            </div>

            <canvas id="gameCanvas" width="300" height="400"></canvas>

            <div class="energy-bar-container">
                <div id="energy-fill"></div>
            </div>

            <div id="overlay">
                <h2 id="msg">AKIBA DEFENDER<br>PROTOCOL ACTIVATED</h2>
                <p class="instruction">TOCA LA PANTALLA PARA<br>INTERCEPTAR LOS GLITCHES</p>
                <div class="overlay-btns">
                    <div class="btn-overlay" onclick="startGame()">DESPLEGAR</div>
                    <div id="back-btn" class="btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">MENU</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const healthEl = document.getElementById('health');
        const energyFill = document.getElementById('energy-fill');
        const msgEl = document.getElementById('msg');
        const backBtn = document.getElementById('back-btn');
        const overlay = document.getElementById('overlay');

        let score = 0;
        let health = 100;
        let energy = 100;
        let gameActive = false;

        let glitches = [];
        let explosions = [];
        let spawnRate = 0.008; // Comienza mucho más bajo (antes 0.02)

        class Glitch {
            constructor() {
                this.x = 20 + Math.random() * (canvas.width - 40);
                this.y = -20;
                // Velocidad inicial más lenta (antes 1 + score/500)
                this.speed = 0.8 + (score / 1500); 
                this.size = 10 + Math.random() * 6;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height - 50) {
                    this.impact();
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = '#0f380f';
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.strokeStyle = '#8bab0e';
                ctx.strokeRect(this.x - this.size/2 + 2, this.y - this.size/2 + 2, this.size - 4, this.size - 4);
            }
            impact() {
                // Daño progresivo: empieza en 5, escala a 10 con el tiempo
                const damage = score > 1000 ? 10 : 5;
                health -= damage;
                healthEl.innerText = Math.max(0, health);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                if (health <= 0) gameOver();
            }
        }

        class Explosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 2;
                this.maxRadius = 35;
                this.growing = true;
            }
            update() {
                if (this.growing) {
                    this.radius += 3;
                    if (this.radius >= this.maxRadius) this.growing = false;
                } else {
                    this.radius -= 2;
                }
                return this.radius > 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#306230';
                ctx.fill();
                ctx.strokeStyle = '#0f380f';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function handleTouch(e) {
            if (!gameActive || energy < 15) return; // Costo reducido ligeramente

            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            // No disparar en zona HUD
            if (y < 40) return;

            explosions.push(new Explosion(x, y));
            energy -= 15;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function spawnGlitch() {
            if (Math.random() < spawnRate) {
                glitches.push(new Glitch());
            }
            // Incremento de frecuencia mucho más gradual (antes score/10000)
            spawnRate = 0.008 + (score / 25000);
            // Cap de dificultad para que no sea imposible
            if (spawnRate > 0.08) spawnRate = 0.08;
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fondo digital
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Servidores abajo
            ctx.fillStyle = '#0f380f';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            for(let i=0; i<6; i++) {
                ctx.fillStyle = '#306230';
                ctx.fillRect(10 + i*50, canvas.height - 40, 30, 30);
                ctx.fillStyle = '#8bab0e';
                ctx.fillRect(15 + i*50, canvas.height - 35, 20, 4);
            }

            // Recarga energía equilibrada
            if (energy < 100) energy += 0.5;
            energyFill.style.width = energy + '%';

            spawnGlitch();

            // Glitches
            glitches = glitches.filter(g => {
                const alive = g.update();
                if (alive) g.draw();
                return alive;
            });

            // Explosiones y colisiones
            explosions = explosions.filter(exp => {
                const active = exp.update();
                if (active) {
                    exp.draw();
                    glitches.forEach((g, index) => {
                        const dist = Math.hypot(g.x - exp.x, g.y - exp.y);
                        if (dist < exp.radius + g.size/2) {
                            glitches.splice(index, 1);
                            score += 10;
                            scoreEl.innerText = score.toString().padStart(3, '0');
                        }
                    });
                }
                return active;
            });

            requestAnimationFrame(update);
        }

        function startGame() {
            overlay.classList.add('hidden');
            backBtn.classList.add('hidden');
            score = 0;
            health = 100;
            energy = 100;
            glitches = [];
            explosions = [];
            spawnRate = 0.008;
            scoreEl.innerText = "000";
            healthEl.innerText = "100";
            gameActive = true;
            update();
        }

        function gameOver() {
            gameActive = false;
            msgEl.innerHTML = "SISTEMA COMPROMETIDO<br>PUNTUACIÓN: " + score;
            backBtn.classList.remove('hidden');
            overlay.classList.remove('hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); });
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleTouch(e); });

    </script>
</body>
</html>
