<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akiba Platformer - Akiba-OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 320px;
            height: 320px;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            background: var(--screen-green);
            z-index: 5;
        }

        canvas { display: block; background-color: #8bab0e; }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .dpad {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            width: 54px;
            height: 54px;
            background: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border-radius: 10px;
            box-shadow: 0 4px 0 #000;
        }

        .btn-action:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
            background: #111;
        }

        .btn-round {
            border-radius: 50%;
            width: 75px;
            height: 65px;
            background: #a00;
            border-color: #600;
            font-size: 10px;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
        h2 { font-size: 10px; margin-bottom: 10px; }
        p { font-size: 7px; line-height: 1.5; margin-bottom: 15px; }

        .btn-menu {
            padding: 10px; font-size: 9px; width: 150px;
            color: #eee; background: #222; border: 4px solid #444;
            border-radius: 8px; font-family: var(--font-main);
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE: <span id="score">0</span></div>
                <div>LEVEL: <span id="level">1</span></div>
            </div>
            <canvas id="gameCanvas" width="320" height="280"></canvas>
            <div id="overlay">
                <h2 id="msg">AKIBA PLATFORMER</h2>
                <p>NIVELES GENERADOS<br>POR CÓDIGO PROCEDURAL</p>
                <div class="btn-menu" onclick="startGame()">INICIAR</div>
                <div id="back-btn" class="btn-menu hidden" style="background-color: #444;" onclick="backToMenu()">MENU</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="dpad">
            <div class="btn-action" id="left">←</div>
            <div class="btn-action" id="right">→</div>
        </div>
        <div class="btn-action btn-round" id="jump">SALTAR</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const msgEl = document.getElementById('msg');
        const overlay = document.getElementById('overlay');
        const backBtn = document.getElementById('back-btn');

        let gameActive = false;
        let score = 0;
        let itemsCollectedCount = 0;
        let level = 1;
        let reqItems = 3;

        const camera = {
            x: 0,
            y: 0,
            width: canvas.width,
            height: canvas.height
        };

        const player = {
            x: 50,
            y: 150,
            oldY: 150,
            w: 16,
            h: 20,
            vx: 0,
            vy: 0,
            speed: 3.2, // Ligera mejora de velocidad
            jumpPower: -8.5, // Salto ajustado
            gravity: 0.4, // Menos gravedad = más control
            grounded: false
        };

        let keys = { left: false, right: false };
        let platforms = [];
        let items = [];
        let exit = { x: 0, y: 0, w: 24, h: 32, active: false };
        let worldWidth = 320;

        function initLevel() {
            itemsCollectedCount = 0;
            reqItems = 3 + Math.floor(level / 2);
            scoreEl.innerText = score;
            levelEl.innerText = level;
            
            player.x = 50;
            player.y = 100;
            player.oldY = 100;
            player.vx = 0;
            player.vy = 0;
            camera.x = 0;

            platforms = [];
            items = [];
            
            let currentX = 0;
            let currentY = 220;
            worldWidth = 450 + (level * 250);

            // Inicio seguro
            platforms.push({ x: 0, y: 220, w: 120, h: 60, type: 'solid' });
            currentX = 120;

            while (currentX < worldWidth - 120) {
                // Gap más pequeño para reducir dificultad
                let gap = 40 + Math.random() * 50 + (level * 1.5);
                if (gap > 105) gap = 105; 
                currentX += gap;

                let platW = 50 + Math.random() * 60;
                let diffY = (Math.random() - 0.5) * 60;
                currentY += diffY;
                
                if (currentY < 130) currentY = 130;
                if (currentY > 240) currentY = 240;

                // Plataforma principal
                const mainPlat = { x: currentX, y: currentY, w: platW, h: 100, type: 'solid' };
                platforms.push(mainPlat);

                // Plataforma flotante con altura controlada (Accesible)
                if (Math.random() > 0.4) {
                    const floatW = 35 + Math.random() * 25;
                    // Siempre a una altura saltable desde la plataforma actual
                    const floatY = currentY - 55 - Math.random() * 20; 
                    const floatX = currentX + (platW / 2) - (floatW / 2);
                    
                    const floatPlat = { x: floatX, y: floatY, w: floatW, h: 8, type: 'floating' };
                    platforms.push(floatPlat);

                    // Poner item en la flotante
                    if (items.length < reqItems) {
                        items.push({
                            x: floatX + (floatW / 2) - 5,
                            y: floatY - 22,
                            w: 10,
                            h: 10,
                            collected: false
                        });
                    }
                } else if (items.length < reqItems) {
                    // Poner item en la base si no hay flotante
                    items.push({
                        x: currentX + (platW / 2) - 5,
                        y: currentY - 22,
                        w: 10,
                        h: 10,
                        collected: false
                    });
                }

                currentX += platW;
            }

            // Fallback para items
            while(items.length < reqItems) {
                let p = platforms[Math.floor(Math.random() * platforms.length)];
                items.push({
                    x: p.x + (p.w/2) - 5,
                    y: p.y - 25,
                    w: 10,
                    h: 10,
                    collected: false
                });
            }

            platforms.push({ x: currentX + 40, y: currentY, w: 100, h: 100, type: 'solid' });
            exit = { x: currentX + 80, y: currentY - 32, w: 24, h: 32, active: false };
        }

        function update() {
            if(!gameActive) return;

            player.oldY = player.y;

            if(keys.left) player.vx = -player.speed;
            else if(keys.right) player.vx = player.speed;
            else player.vx *= 0.85;

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            let targetCamX = player.x - canvas.width / 2.5;
            if (targetCamX < 0) targetCamX = 0;
            if (targetCamX > worldWidth + 140 - canvas.width) targetCamX = worldWidth + 140 - canvas.width;
            camera.x += (targetCamX - camera.x) * 0.12;

            if(player.x < 0) player.x = 0;
            if(player.y > canvas.height + 50) die();

            player.grounded = false;
            platforms.forEach(p => {
                if (player.x + player.w > p.x && player.x < p.x + p.w) {
                    if (player.y + player.h > p.y && player.y + player.h < p.y + p.h) {
                        // Tolerancia de física mejorada
                        if (player.oldY + player.h <= p.y + 5) { 
                            player.grounded = true;
                            player.vy = 0;
                            player.y = p.y - player.h;
                        }
                    }
                }
            });

            items.forEach(item => {
                if(!item.collected && 
                   player.x < item.x + item.w && player.x + player.w > item.x &&
                   player.y < item.y + item.h && player.y + player.h > item.y) {
                    item.collected = true;
                    itemsCollectedCount++;
                    score += (10 * level);
                    scoreEl.innerText = score;
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    if(itemsCollectedCount >= reqItems) exit.active = true;
                }
            });

            if(exit.active && 
               player.x < exit.x + exit.w && player.x + player.w > exit.x &&
               player.y < exit.y + exit.h && player.y + player.h > exit.y) {
                winLevel();
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, 0);

            ctx.fillStyle = '#9bbc0f';
            for(let i=0; i < worldWidth; i+=140) {
                ctx.fillText("01", i + 10, 40);
                ctx.fillText("11", i + 100, 180);
            }

            platforms.forEach(p => {
                if (p.x + p.w > camera.x && p.x < camera.x + canvas.width) {
                    if (p.type === 'solid') {
                        ctx.fillStyle = '#306230';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.strokeStyle = '#0f380f';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(p.x, p.y, p.w, p.h);
                    } else {
                        ctx.fillStyle = '#0f380f';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#306230';
                        ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
                    }
                }
            });

            items.forEach(item => {
                if(!item.collected && item.x + item.w > camera.x && item.x < camera.x + canvas.width) {
                    ctx.fillStyle = '#0f380f';
                    ctx.beginPath();
                    ctx.arc(item.x + 5, item.y + 5, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#9bbc0f';
                    ctx.fillRect(item.x+3, item.y+3, 2, 2);
                }
            });

            if(exit.active) {
                ctx.fillStyle = '#0f380f';
                ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
                ctx.fillStyle = (Date.now() % 600 > 300) ? '#9bbc0f' : '#306230';
                ctx.fillRect(exit.x+4, exit.y+4, exit.w-8, exit.h-8);
            }

            ctx.fillStyle = '#0f380f';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#9bbc0f';
            let eyeX = player.vx >= 0 ? player.x + 10 : player.x + 2;
            ctx.fillRect(eyeX, player.y + 4, 4, 4);

            ctx.restore();
        }

        function jump() {
            if(player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function winLevel() {
            level++;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            initLevel();
        }

        function die() {
            gameActive = false;
            msgEl.innerHTML = "SISTEMA CAÍDO<br>NIVEL ALCANZADO: " + level;
            backBtn.classList.remove('hidden');
            overlay.classList.remove('hidden');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function startGame() {
            overlay.classList.add('hidden');
            level = 1;
            score = 0;
            initLevel();
            gameActive = true;
            update();
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        const setupBtn = (id, type) => {
            const el = document.getElementById(id);
            const start = (e) => { 
                e.preventDefault(); 
                if(type==='jump') jump(); 
                else keys[type]=true; 
            };
            const end = (e) => { 
                e.preventDefault(); 
                if(type!=='jump') keys[type]=false; 
            };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
        };

        setupBtn('left', 'left');
        setupBtn('right', 'right');
        setupBtn('jump', 'jump');

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft') keys.left = true;
            if(e.key === 'ArrowRight') keys.right = true;
            if(e.key === ' ' || e.key === 'ArrowUp') jump();
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowLeft') keys.left = false;
            if(e.key === 'ArrowRight') keys.right = false;
        });

        draw();
    </script>
</body>
</html>
