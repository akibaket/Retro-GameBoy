<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxian</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
            position: relative;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            background: var(--screen-green);
            z-index: 5;
        }

        canvas {
            display: block;
            background-color: #8bab0e;
        }

        /* Controls */
        .controls-panel {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            height: 60px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
            background-color: #111;
        }

        .btn-fire {
            grid-column: span 3;
            background-color: #a00;
            border-color: #600;
            font-size: 14px;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
        h2 { font-size: 14px; margin-bottom: 20px; line-height: 1.4; }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .btn-overlay {
            padding: 10px; 
            font-size: 10px; 
            width: 160px; 
            height: auto;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE:<br><span id="score">000000</span></div>
                <div>WAVE:<span id="wave">01</span></div>
            </div>

            <canvas id="gameCanvas" width="240" height="320"></canvas>

            <div id="overlay">
                <h2 id="msg">GALAXIAN</h2>
                <div class="overlay-btns">
                    <div class="btn btn-overlay" onclick="startGame()">START</div>
                    <div id="back-btn" class="btn btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">BACK TO MENU</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="btn" id="ctrl-left">←</div>
        <div class="btn" id="ctrl-right">→</div>
        <div class="btn btn-fire" id="ctrl-fire">FIRE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const msgEl = document.getElementById('msg');
        const backBtn = document.getElementById('back-btn');

        let score = 0;
        let wave = 1;
        let gameActive = false;
        
        // Player state
        const player = {
            x: canvas.width / 2 - 8,
            y: canvas.height - 30,
            w: 16,
            h: 12,
            speed: 3
        };

        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let particles = [];

        // Input handling
        const keys = {};
        
        function bindControl(id, key) {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }

        bindControl('ctrl-left', 'left');
        bindControl('ctrl-right', 'right');
        bindControl('ctrl-fire', 'fire');

        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowLeft') keys.left = true;
            if(e.code === 'ArrowRight') keys.right = true;
            if(e.code === 'Space') keys.fire = true;
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'ArrowRight') keys.right = false;
            if(e.code === 'Space') keys.fire = false;
        });

        // Sprites
        function drawPlayer(x, y) {
            ctx.fillStyle = '#0f380f';
            ctx.fillRect(x + 6, y, 4, 4);
            ctx.fillRect(x + 2, y + 4, 12, 4);
            ctx.fillRect(x, y + 8, 16, 4);
        }

        function drawEnemy(x, y, type) {
            ctx.fillStyle = '#0f380f';
            if(type === 0) { 
                ctx.fillRect(x + 4, y, 8, 4);
                ctx.fillRect(x + 2, y + 4, 12, 4);
                ctx.fillRect(x, y + 8, 4, 4);
                ctx.fillRect(x + 12, y + 8, 4, 4);
            } else { 
                ctx.fillRect(x, y, 4, 12);
                ctx.fillRect(x + 12, y, 4, 12);
                ctx.fillRect(x + 4, y + 4, 8, 4);
            }
        }

        function spawnEnemies() {
            enemies = [];
            const rows = 3 + Math.min(wave, 2);
            const cols = 6;
            for(let i = 0; i < rows; i++) {
                for(let j = 0; j < cols; j++) {
                    enemies.push({
                        x: 30 + j * 30,
                        y: 40 + i * 25,
                        w: 16,
                        h: 12,
                        type: i % 2,
                        dir: 1,
                        alive: true,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
        }

        let fireCooldown = 0;

        function update() {
            if(!gameActive) return;

            if(keys.left && player.x > 0) player.x -= player.speed;
            if(keys.right && player.x < canvas.width - player.w) player.x += player.speed;
            
            if(keys.fire && fireCooldown <= 0) {
                bullets.push({x: player.x + 7, y: player.y, w: 2, h: 6});
                fireCooldown = 15;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
            if(fireCooldown > 0) fireCooldown--;

            bullets.forEach((b, i) => {
                b.y -= 5;
                if(b.y < 0) bullets.splice(i, 1);
            });

            let edgeReached = false;
            enemies.forEach(e => {
                e.x += (0.5 + (wave * 0.2)) * e.dir;
                if(e.x > canvas.width - 20 || e.x < 5) edgeReached = true;
                if(Math.random() < 0.001 * wave) {
                    enemyBullets.push({x: e.x + 8, y: e.y + 12, w: 2, h: 4});
                }
            });

            if(edgeReached) {
                enemies.forEach(e => {
                    e.dir *= -1;
                    e.y += 5;
                });
            }

            enemyBullets.forEach((eb, i) => {
                eb.y += 3;
                if(eb.y > canvas.height) enemyBullets.splice(i, 1);
                if(eb.x < player.x + player.w && eb.x + eb.w > player.x && 
                   eb.y < player.y + player.h && eb.y + eb.h > player.y) {
                    gameOver();
                }
            });

            bullets.forEach((b, bi) => {
                enemies.forEach((e, ei) => {
                    if(b.x < e.x + e.w && b.x + b.w > e.x && 
                       b.y < e.y + e.h && b.y + b.h > e.y) {
                        bullets.splice(bi, 1);
                        enemies.splice(ei, 1);
                        score += 100;
                        createExplosion(e.x + 8, e.y + 6);
                        scoreEl.innerText = score.toString().padStart(6, '0');
                        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    }
                });
            });

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            });

            if(enemies.length === 0) {
                wave++;
                waveEl.innerText = wave.toString().padStart(2, '0');
                spawnEnemies();
            }

            enemies.forEach(e => {
                if(e.y + e.h > player.y) gameOver();
            });

            draw();
            requestAnimationFrame(update);
        }

        function createExplosion(x, y) {
            for(let i = 0; i < 5; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 15
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawPlayer(player.x, player.y);
            enemies.forEach(e => drawEnemy(e.x, e.y, e.type));
            ctx.fillStyle = '#0f380f';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
            enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.w, eb.h));
            particles.forEach(p => ctx.fillRect(p.x, p.y, 2, 2));
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            backBtn.classList.add('hidden');
            msgEl.innerHTML = "GALAXIAN";
            score = 0;
            wave = 1;
            scoreEl.innerText = "000000";
            waveEl.innerText = "01";
            player.x = canvas.width / 2 - 8;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            spawnEnemies();
            gameActive = true;
            update();
        }

        function gameOver() {
            gameActive = false;
            msgEl.innerHTML = "FIN DE TRANSMISION<br>SCORE: " + score;
            backBtn.classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        draw();
    </script>
</body>
</html>
