<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akiba Arkanoid - Akiba-OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
            position: relative;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            background: var(--screen-green);
            z-index: 5;
        }

        canvas {
            display: block;
            background-color: #8bab0e;
        }

        /* Controls */
        .controls-panel {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 260px;
        }

        .btn {
            background-color: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            height: 70px;
            flex: 1;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #000;
            background-color: #111;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
        h2 { font-size: 14px; margin-bottom: 20px; line-height: 1.4; }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .btn-overlay {
            padding: 10px; 
            font-size: 10px; 
            width: 160px; 
            height: auto;
            color: #eee;
            background-color: #222;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE:<br><span id="score">0000</span></div>
                <div>LIVES:<span id="lives">3</span></div>
            </div>

            <canvas id="gameCanvas" width="240" height="300"></canvas>

            <div id="overlay">
                <h2 id="msg">AKIBA-ARKANOID</h2>
                <div class="overlay-btns">
                    <div class="btn btn-overlay" onclick="startGame()">START</div>
                    <div id="back-btn" class="btn btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">BACK TO MENU</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="btn" id="ctrl-left">←</div>
        <div class="btn" id="ctrl-right">→</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const msgEl = document.getElementById('msg');
        const backBtn = document.getElementById('back-btn');

        let score = 0;
        let lives = 3;
        let gameActive = false;

        const paddle = {
            w: 40,
            h: 8,
            x: canvas.width / 2 - 20,
            y: canvas.height - 20,
            speed: 5
        };

        const ball = {
            x: 0,
            y: 0,
            radius: 4,
            dx: 2,
            dy: -2,
            speed: 2.5
        };

        let bricks = [];
        const brickRows = 5;
        const brickCols = 6;
        const brickWidth = 34;
        const brickHeight = 10;
        const brickPadding = 4;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 8;

        const keys = { left: false, right: false };

        function bindControl(id, key) {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }

        bindControl('ctrl-left', 'left');
        bindControl('ctrl-right', 'right');

        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowLeft') keys.left = true;
            if(e.code === 'ArrowRight') keys.right = true;
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'ArrowRight') keys.right = false;
        });

        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickCols; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRows; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        function drawPaddle() {
            ctx.fillStyle = '#0f380f';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.strokeStyle = '#306230';
            ctx.strokeRect(paddle.x + 1, paddle.y + 1, paddle.w - 2, paddle.h - 2);
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#0f380f';
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickCols; c++) {
                for (let r = 0; r < brickRows; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.fillStyle = r % 2 === 0 ? '#0f380f' : '#306230';
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                        // Borde interno
                        ctx.strokeStyle = '#8bab0e';
                        ctx.strokeRect(brickX + 1, brickY + 1, brickWidth - 2, brickHeight - 2);
                    }
                }
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brickCols; c++) {
                for (let r = 0; r < brickRows; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += 10;
                            scoreEl.innerText = score.toString().padStart(4, '0');
                            
                            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                            
                            // Aceleración gradual
                            ball.dx *= 1.01;
                            ball.dy *= 1.01;

                            if (score === brickRows * brickCols * 10) {
                                winGame();
                            }
                        }
                    }
                }
            }
        }

        function update() {
            if (!gameActive) return;

            if (keys.left && paddle.x > 0) {
                paddle.x -= paddle.speed;
            } else if (keys.right && paddle.x < canvas.width - paddle.w) {
                paddle.x += paddle.speed;
            }

            // Rebote paredes
            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            } else if (ball.y + ball.dy > canvas.height - ball.radius - 10) {
                // Colisión con pala
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    ball.dy = -Math.abs(ball.dy);
                    // Cambiar ángulo según donde golpee la pala
                    let hitPoint = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                    ball.dx = hitPoint * ball.speed * 1.5;
                    
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                    lives--;
                    livesEl.innerText = lives;
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                    
                    if (!lives) {
                        gameOver();
                    } else {
                        resetBall();
                    }
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            collisionDetection();
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 40;
            ball.dx = 2;
            ball.dy = -2;
            paddle.x = (canvas.width - paddle.w) / 2;
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            backBtn.classList.add('hidden');
            msgEl.innerHTML = "AKIBA-ARKANOID";
            score = 0;
            lives = 3;
            scoreEl.innerText = "0000";
            livesEl.innerText = "3";
            initBricks();
            resetBall();
            gameActive = true;
            update();
        }

        function winGame() {
            gameActive = false;
            msgEl.innerHTML = "MISION CUMPLIDA!<br>SCORE: " + score;
            backBtn.classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function gameOver() {
            gameActive = false;
            msgEl.innerHTML = "SISTEMA CAIDO<br>SCORE: " + score;
            backBtn.classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        // Estado inicial
        initBricks();
        draw();
    </script>
</body>
</html>
