<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akiba Jump - Akiba-OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
            position: relative;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            background: var(--screen-green);
            z-index: 5;
        }

        canvas {
            display: block;
            background-color: #8bab0e;
        }

        /* Controls */
        .controls-panel {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 260px;
        }

        .btn {
            background-color: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            height: 70px;
            flex: 1;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0 #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #000;
            background-color: #111;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
        h2 { font-size: 14px; margin-bottom: 20px; line-height: 1.4; }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .btn-overlay {
            padding: 10px; 
            font-size: 10px; 
            width: 160px; 
            height: auto;
            color: #eee;
            background-color: #222;
            border: 4px solid #444;
            border-radius: 8px;
            font-family: var(--font-main);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE:<br><span id="score">00000</span></div>
                <div>MAX:<br><span id="max-score">00000</span></div>
            </div>

            <canvas id="gameCanvas" width="240" height="320"></canvas>

            <div id="overlay">
                <h2 id="msg">AKIBA-JUMP</h2>
                <div class="overlay-btns">
                    <div class="btn-overlay" onclick="startGame()">START</div>
                    <div id="back-btn" class="btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">BACK TO MENU</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="btn" id="ctrl-left">←</div>
        <div class="btn" id="ctrl-right">→</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const maxScoreEl = document.getElementById('max-score');
        const msgEl = document.getElementById('msg');
        const backBtn = document.getElementById('back-btn');

        let score = 0;
        let maxScore = 0;
        let gameActive = false;

        const gravity = 0.25;
        const jumpPower = -6.5;

        let player = {
            x: canvas.width / 2 - 8,
            y: canvas.height - 50,
            w: 16,
            h: 16,
            dx: 0,
            dy: 0
        };

        let platforms = [];

        const keys = { left: false, right: false };

        function bindControl(id, key) {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            el.addEventListener('touchstart', start, {passive: false});
            el.addEventListener('touchend', end, {passive: false});
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }

        bindControl('ctrl-left', 'left');
        bindControl('ctrl-right', 'right');

        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowLeft') keys.left = true;
            if(e.code === 'ArrowRight') keys.right = true;
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'ArrowRight') keys.right = false;
        });

        function initPlatforms() {
            platforms = [];
            // Plataforma base inicial
            platforms.push({ x: canvas.width / 2 - 25, y: canvas.height - 20, w: 50, h: 8 });
            
            // Generar plataformas hacia arriba
            for (let i = 1; i < 8; i++) {
                platforms.push({
                    x: Math.random() * (canvas.width - 40),
                    y: canvas.height - 20 - (i * 45),
                    w: 40,
                    h: 8
                });
            }
        }

        function update() {
            if (!gameActive) return;

            // Movimiento horizontal
            if (keys.left) player.dx -= 0.6;
            if (keys.right) player.dx += 0.6;

            player.dx *= 0.85; // Fricción
            player.x += player.dx;

            // Screen Wrap (Salir por un lado y entrar por el otro)
            if (player.x > canvas.width) player.x = -player.w;
            if (player.x + player.w < 0) player.x = canvas.width;

            // Gravedad
            player.dy += gravity;
            player.y += player.dy;

            // Movimiento de la cámara (Scrolling vertical)
            if (player.y < canvas.height / 2) {
                let diff = (canvas.height / 2) - player.y;
                player.y = canvas.height / 2;
                
                score += Math.floor(diff);
                scoreEl.innerText = score.toString().padStart(5, '0');

                // Bajar plataformas
                platforms.forEach(p => {
                    p.y += diff;
                });

                // Eliminar plataformas viejas y crear nuevas arriba
                platforms = platforms.filter(p => p.y < canvas.height);
                while (platforms.length < 8) {
                    let highestY = Math.min(...platforms.map(p => p.y));
                    platforms.push({
                        x: Math.random() * (canvas.width - 40),
                        y: highestY - (40 + Math.random() * 20),
                        w: 35 + Math.random() * 15,
                        h: 8
                    });
                }
            }

            // Detección de colisiones (Solo cuando cae)
            if (player.dy > 0) {
                platforms.forEach(p => {
                    if (player.x + 2 < p.x + p.w && player.x + player.w - 2 > p.x &&
                        player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.dy) {
                        
                        player.dy = jumpPower;
                        player.y = p.y - player.h; // Ajustar posición exacta sobre la plataforma
                        
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }
                });
            }

            // Fin del juego (Caer al vacío)
            if (player.y > canvas.height) {
                gameOver();
                return;
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Fondo
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Plataformas
            platforms.forEach(p => {
                ctx.fillStyle = '#306230';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#0f380f';
                ctx.fillRect(p.x, p.y, p.w, 2); // Borde superior para dar detalle 8-bit
            });

            // Jugador
            ctx.fillStyle = '#0f380f';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // Detalles del personaje (Ojos)
            ctx.fillStyle = '#9bbc0f';
            let eyeOffset = player.dx > 0.5 ? 4 : (player.dx < -0.5 ? -4 : 0);
            ctx.fillRect(player.x + 4 + eyeOffset, player.y + 4, 3, 3);
            ctx.fillRect(player.x + 9 + eyeOffset, player.y + 4, 3, 3);
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            backBtn.classList.add('hidden');
            msgEl.innerHTML = "AKIBA-JUMP";
            score = 0;
            scoreEl.innerText = "00000";
            
            player.x = canvas.width / 2 - 8;
            player.y = canvas.height - 50;
            player.dx = 0;
            player.dy = jumpPower; // Salto inicial

            initPlatforms();
            gameActive = true;
            update();
        }

        function gameOver() {
            gameActive = false;
            if (score > maxScore) maxScore = score;
            maxScoreEl.innerText = maxScore.toString().padStart(5, '0');
            
            msgEl.innerHTML = "SYSTEM FALL<br>SCORE: " + score;
            backBtn.classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
            
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        // Dibujo inicial para que no se vea vacío
        initPlatforms();
        draw();
    </script>
</body>
</html>
