<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        /* Contenedor tipo Consola */
        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
            position: relative;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Scanlines CRT */
        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
        }

        canvas {
            display: block;
            background-color: #8bab0e;
        }

        /* Controles */
        .controls-panel {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
            background-color: #111;
        }

        .btn-rotate { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 3; transform: rotate(90deg);}
        .btn-down { grid-column: 2; grid-row: 3; }
        .btn-right { grid-column: 3; grid-row: 3; transform: rotate(-90deg);}

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        h2 { font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .btn-overlay {
            padding: 10px; 
            font-size: 10px; 
            width: 160px; 
            height: auto;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE:<br><span id="score">000000</span></div>
                <div>LVL:<span id="level">01</span></div>
            </div>

            <canvas id="tetris" width="200" height="360"></canvas>

            <div id="overlay">
                <h2 id="msg">TETRIS<br>READY?</h2>
                <div class="overlay-btns">
                    <div class="btn btn-overlay" onclick="startGame()">START</div>
                    <div id="back-btn" class="btn btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">BACK TO MENU</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="btn btn-rotate" id="ctrl-up">↻</div>
        <div class="btn btn-left" id="ctrl-left">↓</div>
        <div class="btn btn-down" id="ctrl-down">↓</div>
        <div class="btn btn-right" id="ctrl-right">↓</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const msgElement = document.getElementById('msg');
        const backBtn = document.getElementById('back-btn');

        context.scale(20, 20);

        // --- Lógica de Repetición de Teclas (Hold functionality) ---
        const keysState = {};
        const timers = {};
        const REPEAT_DELAY = 200; 
        const REPEAT_RATE = 50;   

        function startRepeat(action, key) {
            if (timers[key]) return;
            action();
            timers[key] = setTimeout(() => {
                timers[key] = setInterval(action, REPEAT_RATE);
            }, REPEAT_DELAY);
        }

        function stopRepeat(key) {
            clearTimeout(timers[key]);
            clearInterval(timers[key]);
            delete timers[key];
        }

        // --- Juego ---
        const arena = createMatrix(10, 18);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1
        };

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function draw() {
            context.fillStyle = '#8bab0e';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = '#0f380f';
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = '#9bbc0f';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                msgElement.innerHTML = "GAME OVER<br>SCORE: " + player.score;
                backBtn.classList.remove('hidden');
                document.getElementById('overlay').classList.remove('hidden');
                arena.forEach(row => row.fill(0));
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score.toString().padStart(6, '0');
            player.level = Math.floor(player.score / 100) + 1;
            levelElement.innerText = player.level.toString().padStart(2, '0');
            dropInterval = Math.max(100, 1000 - (player.level * 80));
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (document.getElementById('overlay').classList.contains('hidden')) {
                const deltaTime = time - lastTime;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
                lastTime = time;
                draw();
                requestAnimationFrame(update);
            }
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            backBtn.classList.add('hidden');
            msgElement.innerHTML = "AKIBA-TETRIS<br>READY?";
            player.score = 0;
            updateScore();
            playerReset();
            update();
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        // --- Controles de Botón con Repetición ---
        const bindControl = (id, action, key) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); startRepeat(action, key); };
            const end = (e) => { e.preventDefault(); stopRepeat(key); };
            
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        };

        bindControl('ctrl-left', () => playerMove(-1), 'left');
        bindControl('ctrl-right', () => playerMove(1), 'right');
        bindControl('ctrl-down', () => playerDrop(), 'down');
        bindControl('ctrl-up', () => playerRotate(1), 'up');

        // Teclado
        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            if (e.keyCode === 37) startRepeat(() => playerMove(-1), 'left');
            if (e.keyCode === 39) startRepeat(() => playerMove(1), 'right');
            if (e.keyCode === 40) startRepeat(() => playerDrop(), 'down');
            if (e.keyCode === 38) startRepeat(() => playerRotate(1), 'up');
        });
        document.addEventListener('keyup', e => {
            if (e.keyCode === 37) stopRepeat('left');
            if (e.keyCode === 39) stopRepeat('right');
            if (e.keyCode === 40) stopRepeat('down');
            if (e.keyCode === 38) stopRepeat('up');
        });

    </script>
</body>
</html>
