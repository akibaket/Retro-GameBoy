<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            z-index: 5;
        }

        canvas {
            display: block;
            background-color: #8bab0e;
        }

        .controls-panel {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background-color: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .btn-overlay {
            padding: 10px; 
            font-size: 10px; 
            width: 160px; 
            height: auto;
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE:<span id="score">0000</span></div>
                <div>HI:<span id="high">0000</span></div>
            </div>

            <canvas id="snakeCanvas" width="240" height="240"></canvas>

            <div id="overlay">
                <h2 id="status-title" style="font-size: 14px; margin-bottom: 20px;">SNAKE</h2>
                <div class="overlay-btns">
                    <div class="btn btn-overlay" onclick="resetGame()">START</div>
                    <div id="back-btn" class="btn btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">BACK TO MENU</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="btn btn-up" id="up">↑</div>
        <div class="btn btn-left" id="left">←</div>
        <div class="btn btn-down" id="down">↓</div>
        <div class="btn btn-right" id="right">→</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highEl = document.getElementById('high');
        const statusTitle = document.getElementById('status-title');
        const backBtn = document.getElementById('back-btn');

        const GRID = 15;
        const TILE = canvas.width / GRID;

        // --- Configuración de dificultad ---
        const INITIAL_SPEED = 220; 
        const SPEED_INCREMENT = 1; 
        const MIN_SPEED = 60;      

        let snake = [];
        let food = {x: 0, y: 0};
        let dx = 0;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let highScore = 0;
        let gameSpeed = INITIAL_SPEED;
        let gameLoop;

        function getRandomFood() {
            food.x = Math.floor(Math.random() * GRID);
            food.y = Math.floor(Math.random() * GRID);
            if (snake.some(part => part.x === food.x && part.y === food.y)) {
                getRandomFood();
            }
        }

        function draw() {
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f380f';
            ctx.fillRect(food.x * TILE + 2, food.y * TILE + 2, TILE - 4, TILE - 4);
            
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#0f380f' : '#306230';
                ctx.fillRect(part.x * TILE + 1, part.y * TILE + 1, TILE - 2, TILE - 2);
                
                if(index === 0) {
                    ctx.fillStyle = '#9bbc0f';
                    ctx.fillRect(part.x * TILE + 3, part.y * TILE + 3, 2, 2);
                    ctx.fillRect(part.x * TILE + TILE - 5, part.y * TILE + 3, 2, 2);
                }
            });
        }

        function move() {
            dx = nextDx;
            dy = nextDy;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if(head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID || 
               snake.some(part => part.x === head.x && part.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if(head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score.toString().padStart(4, '0');
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                getRandomFood();
                if(gameSpeed > MIN_SPEED) gameSpeed -= SPEED_INCREMENT;
                clearInterval(gameLoop);
                gameLoop = setInterval(run, gameSpeed);
            } else {
                snake.pop();
            }
        }

        function run() {
            move();
            draw();
        }

        function gameOver() {
            clearInterval(gameLoop);
            if(score > highScore) highScore = score;
            highEl.innerText = highScore.toString().padStart(4, '0');
            
            statusTitle.innerText = "GAME OVER";
            backBtn.classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
            
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function resetGame() {
            document.getElementById('overlay').classList.add('hidden');
            backBtn.classList.add('hidden');
            statusTitle.innerText = "SNAKE";
            
            snake = [{x: 7, y: 7}, {x: 6, y: 7}, {x: 5, y: 7}];
            nextDx = 1; nextDy = 0;
            score = 0;
            gameSpeed = INITIAL_SPEED;
            scoreEl.innerText = "0000";
            getRandomFood();
            clearInterval(gameLoop);
            gameLoop = setInterval(run, gameSpeed);
        }

        function backToMenu() {
            // Cambiar 'index.html' por la ruta real de tu landing page si es distinta
            window.location.href = 'index.html'; 
        }

        function handleInput(dir) {
            if(dir === 'up' && dy === 0) { nextDx = 0; nextDy = -1; }
            if(dir === 'down' && dy === 0) { nextDx = 0; nextDy = 1; }
            if(dir === 'left' && dx === 0) { nextDx = -1; nextDy = 0; }
            if(dir === 'right' && dx === 0) { nextDx = 1; nextDy = 0; }
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        const setupBtn = (id, dir) => {
            const el = document.getElementById(id);
            const action = (e) => { e.preventDefault(); handleInput(dir); };
            el.addEventListener('touchstart', action);
            el.addEventListener('mousedown', action);
        };

        setupBtn('up', 'up');
        setupBtn('down', 'down');
        setupBtn('left', 'left');
        setupBtn('right', 'right');

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp' || e.key === 'w') handleInput('up');
            if(e.key === 'ArrowDown' || e.key === 's') handleInput('down');
            if(e.key === 'ArrowLeft' || e.key === 'a') handleInput('left');
            if(e.key === 'ArrowRight' || e.key === 'd') handleInput('right');
        });

        draw();
    </script>
</body>
</html>
