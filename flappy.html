<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akiba Flappy - Akiba-OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-dark: #0f380f;
            --screen-green: #9bbc0f;
            --text-dark: #0f380f;
            --accent-green: #306230;
            --font-main: 'Press Start 2P', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: none;
        }

        .console-frame {
            background-color: #333;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 0 #000;
            position: relative;
        }

        .screen {
            background-color: var(--screen-green);
            border: 4px solid var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        .hud {
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            border-bottom: 2px solid var(--text-dark);
            background: var(--screen-green);
            z-index: 5;
        }

        canvas {
            display: block;
            background-color: #8bab0e;
        }

        .controls-panel {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 260px;
        }

        .btn-action {
            background-color: #222;
            border: 4px solid #444;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            height: 80px;
            width: 100%;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 0 #000;
        }

        .btn-action:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #000;
            background-color: #111;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-green);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }
        h2 { font-size: 12px; margin-bottom: 20px; line-height: 1.4; }

        .overlay-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .btn-overlay {
            padding: 10px; 
            font-size: 10px; 
            width: 160px; 
            height: auto;
            color: #eee;
            background-color: #222;
            border: 4px solid #444;
            border-radius: 10px;
            font-family: var(--font-main);
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="screen">
            <div class="hud">
                <div>SCORE:<br><span id="score">000</span></div>
                <div>BEST:<br><span id="best">000</span></div>
            </div>

            <canvas id="gameCanvas" width="240" height="320"></canvas>

            <div id="overlay">
                <h2 id="msg">AKIBA-FLAPPY</h2>
                <div class="overlay-btns">
                    <div class="btn btn-overlay" onclick="startGame()">CONECTAR</div>
                    <div id="back-btn" class="btn btn-overlay hidden" style="background-color: #444;" onclick="backToMenu()">SALIR AL MENU</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="btn-action" id="ctrl-action">IMPULSO</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const msgEl = document.getElementById('msg');
        const backBtn = document.getElementById('back-btn');

        let score = 0;
        let bestScore = 0;
        let gameActive = false;

        // Propiedades del Dron (Pájaro)
        const drone = {
            x: 50,
            y: 150,
            w: 18,
            h: 12,
            gravity: 0.25,
            velocity: 0,
            jump: -4.5
        };

        // Obstáculos (Tuberías)
        let pipes = [];
        const pipeWidth = 35;
        const pipeGap = 90;
        const pipeSpeed = 1.5;

        function createPipe() {
            const minHeight = 40;
            const maxHeight = canvas.height - pipeGap - minHeight - 40;
            const height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: height,
                passed: false
            });
        }

        function drawDrone() {
            ctx.fillStyle = '#0f380f';
            // Cuerpo
            ctx.fillRect(drone.x, drone.y, drone.w, drone.h);
            // Hélices
            ctx.fillRect(drone.x - 2, drone.y - 2, 6, 2);
            ctx.fillRect(drone.x + drone.w - 4, drone.y - 2, 6, 2);
            // Tren de aterrizaje
            ctx.fillRect(drone.x + 4, drone.y + drone.h, 10, 2);
        }

        function drawPipes() {
            ctx.fillStyle = '#306230';
            pipes.forEach(p => {
                // Tubería superior
                ctx.fillRect(p.x, 0, pipeWidth, p.topHeight);
                ctx.strokeStyle = '#0f380f';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, 0, pipeWidth, p.topHeight);

                // Tubería inferior
                const bottomY = p.topHeight + pipeGap;
                ctx.fillRect(p.x, bottomY, pipeWidth, canvas.height - bottomY);
                ctx.strokeRect(p.x, bottomY, pipeWidth, canvas.height - bottomY);
            });
        }

        function update() {
            if (!gameActive) return;

            drone.velocity += drone.gravity;
            drone.y += drone.velocity;

            // Colisión con suelo o techo
            if (drone.y + drone.h > canvas.height || drone.y < 0) {
                gameOver();
                return;
            }

            // Actualizar tuberías
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 120) {
                createPipe();
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= pipeSpeed;

                // Colisiones
                if (
                    drone.x < p.x + pipeWidth &&
                    drone.x + drone.w > p.x &&
                    (drone.y < p.topHeight || drone.y + drone.h > p.topHeight + pipeGap)
                ) {
                    gameOver();
                    return;
                }

                // Puntuación
                if (!p.passed && p.x + pipeWidth < drone.x) {
                    p.passed = true;
                    score++;
                    scoreEl.innerText = score.toString().padStart(3, '0');
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                }

                // Eliminar tuberías fuera de pantalla
                if (p.x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#8bab0e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawDrone();
        }

        function jump() {
            if (!gameActive) return;
            drone.velocity = drone.jump;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            backBtn.classList.add('hidden');
            score = 0;
            scoreEl.innerText = "000";
            drone.y = 150;
            drone.velocity = 0;
            pipes = [];
            gameActive = true;
            update();
        }

        function gameOver() {
            gameActive = false;
            if (score > bestScore) bestScore = score;
            bestEl.innerText = bestScore.toString().padStart(3, '0');
            
            msgEl.innerHTML = "DRON PERDIDO<br>PUNTOS: " + score;
            backBtn.classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function backToMenu() {
            window.location.href = 'index.html';
        }

        // Controles
        const actionBtn = document.getElementById('ctrl-action');
        const triggerJump = (e) => { e.preventDefault(); jump(); };
        actionBtn.addEventListener('touchstart', triggerJump);
        actionBtn.addEventListener('mousedown', triggerJump);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });

        draw();
    </script>
</body>
</html>
